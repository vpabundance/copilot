<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Octant Copilot — Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f7f8;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .demo-card {
      text-align: center;
      max-width: 480px;
      padding: 48px 32px;
    }
    h1 { font-size: 28px; margin-bottom: 12px; }
    p { font-size: 16px; color: #666; line-height: 1.6; margin-bottom: 8px; }
    code {
      display: inline-block;
      background: #eee;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="demo-card">
    <h1>Octant Copilot Demo</h1>
    <p>Click the button in the bottom-right corner to open the copilot.</p>
    <p>This demo loads <code>widget.js</code> and connects to the local API proxy.</p>
  </div>

  <script>
    window.OctantCopilotConfig = { apiUrl: "http://localhost:3000/api/chat" };
  </script>
  <script src="/widget.js" defer></script>
</body>
</html>
